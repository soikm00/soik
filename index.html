<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>카카오맵 장소 검색 서비스</title>
    <style>
        /* 웹페이지 기본 여백 제거 및 전체 높이 설정 */
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        html, body {
            width: 100%;
            height: 100%;
            font-family: 'Malgun Gothic', dotum, sans-serif;
        }

        /* 메인 컨테이너: 왼쪽과 오른쪽을 2분할하는 Flexbox */
        .container {
            display: flex;
            width: 100%;
            height: 100%;
        }

        /* 왼쪽 사이드바 (검색창 + 결과 리스트) */
        .sidebar {
            width: 350px; /* 사이드바 너비 고정 */
            height: 100%;
            background-color: #f7f7f7;
            box-shadow: 2px 0 5px rgba(0,0,0,0.1);
            display: flex;
            flex-direction: column;
            z-index: 10;
        }

        /* 검색 영역 스타일 */
        .search-box {
            padding: 20px;
            background-color: #fff;
            border-bottom: 1px solid #eee;
        }
        .search-form {
            display: flex;
            gap: 8px;
        }
        .search-input {
            flex: 1;
            padding: 10px;
            border: 1px solid #ccc;
            border-radius: 4px;
            font-size: 14px;
        }
        .search-button {
            padding: 10px 15px;
            background-color: #ffeb3b; /* 카카오 느낌의 노란색 */
            border: 1px solid #fbc02d;
            border-radius: 4px;
            cursor: pointer;
            font-weight: bold;
        }
        .search-button:hover {
            background-color: #fdd835;
        }

        /* 검색 결과 리스트 영역 (스크롤 가능하게 설정) */
        .results-list {
            flex: 1;
            overflow-y: auto;
            padding: 10px;
        }
        .result-item {
            padding: 15px;
            background-color: #fff;
            border-radius: 4px;
            margin-bottom: 10px;
            border: 1px solid #e0e0e0;
            cursor: pointer;
        }
        .result-item:hover {
            background-color: #f5f5f5;
        }
        .result-item h5 {
            font-size: 16px;
            margin-bottom: 5px;
            color: #333;
        }
        .result-item p {
            font-size: 13px;
            color: #666;
        }

        /* 오른쪽 지도 영역 */
        .map-container {
            flex: 1; /* 남은 화면 전체 차지 */
            height: 100%;
        }
    </style>
</head>
<body>

    <div class="container">
        <!-- 왼쪽 사이드바 영역 -->
        <div class="sidebar">
            <div class="search-box">
                <form class="search-form" onsubmit="searchPlaces(); return false;">
                    <input type="text" id="keywordInput" class="search-input" value="이태원 맛집" placeholder="장소를 입력하세요">
                    <button type="submit" class="search-button">검색</button>
                </form>
            </div>
            <!-- 검색 결과가 여기에 동적으로 추가됩니다 -->
            <div id="resultsList" class="results-list"></div>
        </div>

        <!-- 오른쪽 지도 영역 -->
        <div id="map" class="map-container"></div>
    </div>

    <!-- 카카오 지도 JavaScript SDK 호출 (autoload=false를 사용해서 안전하게 수동 로드) -->
    <script type="text/javascript" src="//dapi.kakao.com/v2/maps/sdk.js?appkey=42af156f9b0b6cad633384c4661795c6&libraries=services&autoload=false"></script>
    
    <script>
        // 전역 변수 선언
        let map; // 지도 인스턴스
        let placeSearchService; // 장소 검색 서비스 객체
        let markers = []; // 생성된 마커들을 담을 배열

        // 카카오 지도 라이브러리가 완전히 로드된 후에 실행하도록 설정 (로딩 오류 방지)
        kakao.maps.load(function () {
            initializeMap();
        });

        // 지도를 초기화하는 함수
        function initializeMap() {
            const mapContainer = document.getElementById('map'); // 지도를 표시할 HTML 엘리먼트
            
            // 기본 중심 좌표 (위치 권한을 거부했을 때를 대비한 기본 서울 중심 좌표)
            const defaultPosition = new kakao.maps.LatLng(37.566826, 126.9786567); 
            
            const mapOptions = {
                center: defaultPosition, // 지도 중심
                level: 5 // 지도 확대 레벨 (요청 사항: 5)
            };

            // 지도 객체 생성
            map = new kakao.maps.Map(mapContainer, mapOptions);
            
            // 장소 검색 객체 생성
            placeSearchService = new kakao.maps.services.Places();

            // 사용자 브라우저의 위치 권한(Geolocation) 허용 여부 확인
            if (navigator.geolocation) {
                navigator.geolocation.getCurrentPosition(function (position) {
                    const lat = position.coords.latitude;  // 위도
                    const lon = position.coords.longitude; // 경도
                    
                    const currentPosition = new kakao.maps.LatLng(lat, lon);
                    
                    // 지도의 중심을 현재 위치로 변경
                    map.setCenter(currentPosition);
                    
                    // 현재 위치에 표시할 마커 생성
                    const currentMarker = new kakao.maps.Marker({
                        position: currentPosition,
                        map: map
                    });
                    
                    // 인포윈도우로 현재 위치 표시
                    const infoWindow = new kakao.maps.InfoWindow({
                        content: '<div style="padding:5px;font-size:12px;">현재 위치</div>'
                    });
                    infoWindow.open(map, currentMarker);
                    
                }, function (error) {
                    console.log("위치 정보를 가져오는 데 실패했습니다.", error);
                });
            } else {
                alert("이 브라우저에서는 위치 권한 탐색(Geolocation)을 지원하지 않습니다.");
            }
        }

        // 장소 검색 버튼을 눌렀을 때 실행되는 함수
        function searchPlaces() {
            const keyword = document.getElementById('keywordInput').value;

            if (!keyword.replace(/^\s+|\s+$/g, '')) {
                alert('키워드를 입력해주세요!');
                return false;
            }

            // 카카오 장소 검색 API 호출
            placeSearchService.keywordSearch(keyword, placesSearchCallback);
        }

        // 장소 검색이 완료되었을 때 콜백 함수
        function placesSearchCallback(data, status, pagination) {
            if (status === kakao.maps.services.Status.OK) {
                // 이전에 남아있던 마커들과 리스트 아이템 제거
                clearMarkers();
                
                // 검색 결과 리스트 표시 및 마커 그리기
                displayPlaces(data);
            } else if (status === kakao.maps.services.Status.ZERO_RESULT) {
                alert('검색 결과가 존재하지 않습니다.');
            } else if (status === kakao.maps.services.Status.ERROR) {
                alert('검색 결과 중 오류가 발생했습니다.');
            }
        }

        // 검색 결과를 왼쪽 리스트와 지도 마커로 나타내는 함수
        function displayPlaces(places) {
            const listContainer = document.getElementById('resultsList');
            listContainer.innerHTML = ''; // 리스트 초기화
            
            const bounds = new kakao.maps.LatLngBounds(); // 지도 영역을 맞추기 위한 범위 객체

            for (let i = 0; i < places.length; i++) {
                const placePosition = new kakao.maps.LatLng(places[i].y, places[i].x);
                
                // 1. 지도에 마커 추가
                const marker = new kakao.maps.Marker({
                    position: placePosition,
                    map: map
                });
                markers.push(marker); // 추후 삭제를 위해 배열에 보관
                
                // 2. 왼쪽 사이드바에 나타날 리스트 엘리먼트(HTML) 생성
                const resultItem = document.createElement('div');
                resultItem.className = 'result-item';
                resultItem.innerHTML = `
                    <h5>${places[i].place_name}</h5>
                    <p>${places[i].road_address_name ? places[i].road_address_name : places[i].address_name}</p>
                `;

                // 리스트 아이템 클릭 시 해당 위치로 지도 이동 이벤트
                resultItem.onclick = function() {
                    map.setCenter(placePosition);
                    map.setLevel(3); // 클릭 시 조금 더 확대해서 보여주기
                };

                listContainer.appendChild(resultItem);
                
                // 검색된 장소들이 모두 보이도록 지도 범위 확장
                bounds.extend(placePosition);
            }

            // 검색 결과 위치에 맞춰 지도 화면 재조정
            map.setBounds(bounds);
        }

        // 기존 마커들을 지도에서 지우는 함수
        function clearMarkers() {
            for (let i = 0; i < markers.length; i++) {
                markers[i].setMap(null);
            }
            markers = [];
        }
    </script>
</body>
</html>
