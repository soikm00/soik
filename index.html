<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>카카오맵 공부 카페 찾기 서비스</title>
    <style>
        /* 웹페이지 기본 여백 제거 및 전체 높이 설정 */
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        html, body {
            width: 100%;
            height: 100%;
            font-family: 'Malgun Gothic', dotum, sans-serif;
        }

        /* 메인 컨테이너: 왼쪽과 오른쪽을 2분할하는 Flexbox */
        .container {
            display: flex;
            width: 100%;
            height: 100%;
        }

        /* 왼쪽 사이드바 (탭 + 결과 리스트) */
        .sidebar {
            width: 350px; /* 사이드바 너비 고정 */
            height: 100%;
            background-color: #f7f7f7;
            box-shadow: 2px 0 5px rgba(0,0,0,0.1);
            display: flex;
            flex-direction: column;
            z-index: 10;
        }

        /* 탭 메뉴 스타일 */
        .tab-menu {
            display: flex;
            background-color: #fff;
            border-bottom: 1px solid #eee;
        }
        .tab-btn {
            flex: 1;
            padding: 15px;
            text-align: center;
            background: none;
            border: none;
            font-size: 15px;
            font-weight: bold;
            color: #777;
            cursor: pointer;
            transition: all 0.2s;
        }
        .tab-btn:hover {
            background-color: #f9f9f9;
        }
        .tab-btn.active {
            color: #333;
            border-bottom: 3px solid #ffeb3b; /* 활성화된 탭 하단에 카카오 노란색 바 표시 */
            background-color: #fff;
        }

        /* 검색 결과 리스트 영역 (스크롤 가능하게 설정) */
        .results-list {
            flex: 1;
            overflow-y: auto;
            padding: 10px;
        }
        .result-item {
            padding: 15px;
            background-color: #fff;
            border-radius: 4px;
            margin-bottom: 10px;
            border: 1px solid #e0e0e0;
            cursor: pointer;
        }
        .result-item:hover {
            background-color: #f5f5f5;
        }
        .result-item h5 {
            font-size: 16px;
            margin-bottom: 5px;
            color: #333;
        }
        .result-item p {
            font-size: 13px;
            color: #666;
            margin-bottom: 4px;
        }
        .result-item .phone {
            font-size: 12px;
            color: #999;
        }

        /* 오른쪽 지도 영역 */
        .map-container {
            flex: 1; /* 남은 화면 전체 차지 */
            height: 100%;
        }

        /* 커스텀 오버레이(말풍선) 스타일 */
        .custom-overlay {
            position: relative;
            bottom: 50px; /* 마커 이미지 위에 안착하도록 위치 조정 */
            border-radius: 6px;
            border: 1px solid #ccc;
            border-bottom: 2px solid #ddd;
            background-color: #fff;
            box-shadow: 0px 2px 5px rgba(0, 0, 0, 0.2);
            padding: 10px 15px;
            font-size: 13px;
            white-space: nowrap;
        }
        .custom-overlay .title {
            font-weight: bold;
            font-size: 14px;
            margin-bottom: 5px;
            color: #333;
        }
        .custom-overlay .phone {
            color: #666;
            margin-bottom: 8px;
            font-size: 12px;
        }
        .custom-overlay .link-btn {
            display: inline-block;
            padding: 3px 8px;
            font-size: 11px;
            color: #fff;
            background-color: #555;
            text-decoration: none;
            border-radius: 3px;
        }
        .custom-overlay .link-btn:hover {
            background-color: #333;
        }
        /* 말풍선 꼬리 효과 */
        .custom-overlay:after {
            content: '';
            position: absolute;
            margin-left: -6px;
            left: 50%;
            bottom: -6px;
            width: 0;
            height: 0;
            border-top: 6px solid #fff;
            border-left: 6px solid transparent;
            border-right: 6px solid transparent;
        }
    </style>
</head>
<body>

    <div class="container">
        <!-- 왼쪽 사이드바 영역 -->
        <div class="sidebar">
            <!-- 카페 / 스터디카페 탭 메뉴 -->
            <div class="tab-menu">
                <button id="cafeTab" class="tab-btn active" onclick="switchTab('CAFE')">일반 카페</button>
                <button id="studyTab" class="tab-btn" onclick="switchTab('STUDY')">스터디카페</button>
            </div>
            <!-- 검색 결과 리스트 -->
            <div id="resultsList" class="results-list"></div>
        </div>

        <!-- 오른쪽 지도 영역 -->
        <div id="map" class="map-container"></div>
    </div>

    <!-- 카카오 지도 JavaScript SDK 호출 (libraries=services 포함) -->
    <script type="text/javascript" src="//dapi.kakao.com/v2/maps/sdk.js?appkey=42af156f9b0b6cad633384c4661795c6&libraries=services&autoload=false"></script>
    
    <script>
        // 전역 변수 선언
        let map; // 지도 인스턴스
        let placeSearchService; // 장소 검색 서비스 객체
        let markers = []; // 생성된 마커들을 담을 배열
        let currentOverlay = null; // 현재 열려있는 커스텀 오버레이 객체
        let currentTab = 'CAFE'; // 현재 선택된 탭 ('CAFE' 또는 'STUDY')

        // 다른 색상의 마커 이미지 URL 설정 (오픈소스 마커 이미지 활용)
        const yellowMarkerUrl = "https://t1.daumcdn.net/localimg/localimages/07/2012/img/marker_p.png"; // 카페용 노란색 계열 마커
        const greenMarkerUrl = "https://maps.google.com/mapfiles/ms/icons/green-dot.png"; // 스터디카페용 초록색 마커

        // 카카오 지도 라이브러리가 완전히 로드된 후에 실행
        kakao.maps.load(function () {
            initializeMap();
        });

        // 지도를 초기화하는 함수
        function initializeMap() {
            const mapContainer = document.getElementById('map'); 
            const defaultPosition = new kakao.maps.LatLng(37.566826, 126.9786567); // 서울 중심 좌표
            
            const mapOptions = {
                center: defaultPosition, 
                level: 5 // 지도 확대 레벨
            };

            // 지도 객체 생성
            map = new kakao.maps.Map(mapContainer, mapOptions);
            
            // 장소 검색 객체 생성
            placeSearchService = new kakao.maps.services.Places();

            // 지도 클릭 시 열려있는 커스텀 오버레이 닫기
            kakao.maps.event.addListener(map, 'click', function() {
                if (currentOverlay) {
                    currentOverlay.setMap(null);
                }
            });

            // 사용자 브라우저의 위치 권한(Geolocation) 확인 및 중심점 이동
            if (navigator.geolocation) {
                navigator.geolocation.getCurrentPosition(function (position) {
                    const lat = position.coords.latitude;  
                    const lon = position.coords.longitude; 
                    const currentPosition = new kakao.maps.LatLng(lat, lon);
                    
                    map.setCenter(currentPosition);
                    
                    // 현재 위치 마커 표시
                    const currentMarker = new kakao.maps.Marker({
                        position: currentPosition,
                        map: map
                    });
                    
                    const infoWindow = new kakao.maps.InfoWindow({
                        content: '<div style="padding:5px;font-size:12px;text-align:center;">내 현재 위치</div>'
                    });
                    infoWindow.open(map, currentMarker);

                    // 지도 중심이 내 위치로 잡힌 후 자동으로 첫 검색 수행
                    fetchPlaces();
                    
                }, function (error) {
                    console.log("위치 정보를 가져오는 데 실패했습니다.", error);
                    fetchPlaces(); // 내 위치 실패 시 서울 중심 기준으로 기본 검색 수행
                });
            } else {
                fetchPlaces();
            }
        }

        // 탭 전환 함수
        function switchTab(tabType) {
            if (currentTab === tabType) return; // 이미 선택된 탭이면 무시

            currentTab = tabType;

            // UI 탭 활성화 클래스 토글
            document.getElementById('cafeTab').classList.toggle('active', tabType === 'CAFE');
            document.getElementById('studyTab').classList.toggle('active', tabType === 'STUDY');

            // 탭 전환 시 기존 마커 및 말풍선 초기화 후 새로 검색
            clearMarkers();
            if (currentOverlay) currentOverlay.setMap(null);
            
            fetchPlaces();
        }

        // 현재 지도 중심 및 범위 기준으로 장소를 검색하는 함수
        function fetchPlaces() {
            if (currentTab === 'CAFE') {
                // 탭 1 (일반 카페): 카테고리 코드 CE7로 현재 지도 영역 안에서 검색
                placeSearchService.categorySearch('CE7', placesSearchCallback, {
                    location: map.getCenter(),
                    radius: 2000, // 반경 2km 이내
                    useMapBounds: true // 현재 화면에 보이는 영역 중심 검색
                });
            } else if (currentTab === 'STUDY') {
                // 탭 2 (스터디카페): 키워드로 검색하되 현재 지도 중심 기반으로 검색
                placeSearchService.keywordSearch('스터디카페', placesSearchCallback, {
                    location: map.getCenter(),
                    radius: 2000,
                    useMapBounds: true
                });
            }
        }

        // 장소 검색 완료 시 호출되는 콜백 함수
        function placesSearchCallback(data, status, pagination) {
            if (status === kakao.maps.services.Status.OK) {
                clearMarkers();
                displayPlaces(data);
            } else if (status === kakao.maps.services.Status.ZERO_RESULT) {
                const listContainer = document.getElementById('resultsList');
                listContainer.innerHTML = '<div style="padding:20px; text-align:center; color:#999;">검색 결과가 없습니다.</div>';
            } else if (status === kakao.maps.services.Status.ERROR) {
                alert('검색 중 오류가 발생했습니다.');
            }
        }

        // 검색 결과를 사이드바 리스트와 지도 마커로 렌더링하는 함수
        function displayPlaces(places) {
            const listContainer = document.getElementById('resultsList');
            listContainer.innerHTML = ''; // 리스트 초기화
            
            const bounds = new kakao.maps.LatLngBounds(); 

            for (let i = 0; i < places.length; i++) {
                const placePosition = new kakao.maps.LatLng(places[i].y, places[i].x);
                
                // 1. 카테고리별 마커 이미지 다르게 설정
                let markerImageUrl = yellowMarkerUrl; // 기본 노란색 마커 (카페)
                let markerImageSize = new kakao.maps.Size(33, 36); // 카카오 마커 기본 크기 세팅
                
                if (currentTab === 'STUDY') {
                    markerImageUrl = greenMarkerUrl; // 스터디카페는 초록색 마커
                    markerImageSize = new kakao.maps.Size(32, 32); // 구글 마커 이미지 크기에 맞춤
                }

                const markerImage = new kakao.maps.MarkerImage(markerImageUrl, markerImageSize);

                // 마커 생성
                const marker = new kakao.maps.Marker({
                    position: placePosition,
                    image: markerImage,
                    map: map
                });
                markers.push(marker);
                
                // 2. 마커 클릭 시 나타날 커스텀 오버레이(말풍선) HTML 구조 정의
                const placeName = places[i].place_name;
                const placePhone = places[i].phone ? places[i].phone : '전화번호 정보 없음';
                const placeUrl = places[i].place_url; // 카카오맵 상세페이지 링크

                const overlayContent = document.createElement('div');
                overlayContent.className = 'custom-overlay';
                overlayContent.innerHTML = `
                    <div class="title">${placeName}</div>
                    <div class="phone">📞 ${placePhone}</div>
                    <div><a href="${placeUrl}" target="_blank" class="link-btn">카카오맵 보기</a></div>
                `;

                const customOverlay = new kakao.maps.CustomOverlay({
                    position: placePosition,
                    content: overlayContent,
                    clickable: true
                });

                // 마커 클릭 이벤트: 커스텀 오버레이 토글 기능
                kakao.maps.event.addListener(marker, 'click', function() {
                    if (currentOverlay) {
                        currentOverlay.setMap(null); // 기존에 열려있는 말풍선 닫기
                    }
                    customOverlay.setMap(map); // 클릭한 마커 위에 말풍선 열기
                    currentOverlay = customOverlay;
                    map.panTo(placePosition); // 해당 마커 위치로 부드럽게 중심 이동
                });
                
                // 3. 왼쪽 사이드바에 나타날 리스트 아이템 생성
                const resultItem = document.createElement('div');
                resultItem.className = 'result-item';
                resultItem.innerHTML = `
                    <h5>${placeName}</h5>
                    <p>${places[i].road_address_name ? places[i].road_address_name : places[i].address_name}</p>
                    <div class="phone">${placePhone}</div>
                `;

                // 리스트 아이템 클릭 시 지도 이동 및 말풍선 오픈 처리
                resultItem.onclick = function() {
                    if (currentOverlay) {
                        currentOverlay.setMap(null);
                    }
                    customOverlay.setMap(map);
                    currentOverlay = customOverlay;
                    map.setCenter(placePosition);
                    map.setLevel(3); // 클릭하면 상세히 볼 수 있게 확대 레벨 조정
                };

                listContainer.appendChild(resultItem);
                bounds.extend(placePosition);
            }

            // 검색된 장소들이 화면에 모두 보이도록 지도 영역 조정
            map.setBounds(bounds);
        }

        // 기존 마커들을 지도에서 지우는 함수
        function clearMarkers() {
            for (let i = 0; i < markers.length; i++) {
                markers[i].setMap(null);
            }
            markers = [];
        }
    </script>
</body>
</html>
